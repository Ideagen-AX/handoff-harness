<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Search Toolbar — Responsive Search (Before)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0&display=swap"
    rel="stylesheet"
  />
  <!-- Verbatim stylesheet from the Responsive Search project — guarantees the
       toolbar renders identically (tokens, Gilroy, hover/focus, responsive rules). -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Showcase chrome only. This is the isolation frame, not part of the component. -->
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--s-16);
      padding: var(--s-24);
      overflow: auto; /* source sets body{overflow:hidden}; allow the panel to overflow/scroll here */
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(0, 138, 138, .06), transparent 60%),
        var(--ehsq-color-neutral-10);
      box-sizing: border-box;
    }
    *, *::before, *::after { box-sizing: border-box; }

    /* The centred frame that holds the isolated toolbar. */
    .stage-frame {
      width: min(1180px, calc(100vw - 48px));
      background: var(--ehsq-color-white);
      border: 1px solid var(--ehsq-color-neutral-20);
      border-radius: var(--r-lg, 16px);
      box-shadow: 0 18px 48px rgba(32, 42, 53, .12), 0 2px 8px rgba(32, 42, 53, .06);
      overflow: visible; /* let the Options panel drop below the frame edge */
    }
    /* Round the toolbar's own corners to match the frame, and inset the
       controls so the Back button and last view-mode don't touch the edges. */
    .stage-frame .ehsq-toolbar {
      margin: 0;
      border-bottom: 0;
      border-radius: var(--r-lg, 16px);
      padding-inline: var(--s-16);
      overflow: visible;
    }

    /* Options pill is mobile-only — hidden on the desktop (expanded) toolbar,
       where Sort + the view-mode toggles are already inline. It reappears in
       the collapsed layout below. (Source shows it across breakpoints.) */
    .stage-frame .ehsq-toolbar__options-menu { display: none; }

    /* ----- COLLAPSE BREAKPOINT -----
       The expanded desktop toolbar needs ~1150px inside the frame. The frame is
       (100vw - 48px) of outside margin, so collapse the toolbar below 1200px —
       before the view modes would overflow the container — instead of the
       source's 1023px. Mirrors the source's ≤1023px collapse rules, extended up. */
    @media (max-width: 1199px) {
      .stage-frame .ehsq-toolbar__create,
      .stage-frame .ehsq-toolbar__tools-menu,
      .stage-frame .ehsq-toolbar__options-menu { display: inline-flex; }

      .stage-frame .ehsq-toolbar__tool,
      .stage-frame .ehsq-toolbar__action,
      .stage-frame .ehsq-toolbar__sort,
      .stage-frame .ehsq-toolbar__modes { display: none; }
    }

    .stage-caption {
      font-family: var(--font-sans);
      font-size: var(--t-sm, .82rem);
      color: var(--ehsq-color-neutral-60);
      text-align: center;
      letter-spacing: .01em;
    }
    .stage-caption strong { color: var(--ehsq-color-neutral-80); font-weight: 700; }
  </style>
</head>
<body>

  <!-- ===========================
       ISOLATED COMPONENT: Search page toolbar
       Source of truth: "Responsive Search" project (the BEFORE state).
       Markup copied verbatim; behaviour ported in app.js.
       =========================== -->
  <div class="stage-frame">
    <div class="ehsq-toolbar" role="toolbar" aria-label="Page tools">
      <div class="ehsq-toolbar__primary">
        <!-- Mobile-only: Create New button (nav rail is hidden) -->
        <button class="ehsq-toolbar__create" type="button" aria-label="Create new record">
          <span class="material-symbols-rounded" aria-hidden="true">add</span>
        </button>

        <button class="ehsq-toolbar__back" type="button" aria-label="Go back">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </button>

        <!-- Mobile-only: Tools dropdown trigger -->
        <button
          class="ehsq-toolbar__tools-menu"
          type="button"
          data-action="toggle-tools-menu"
          aria-haspopup="menu"
          aria-expanded="false"
        >
          <span>Tools</span>
        </button>
        <button class="ehsq-toolbar__tool" type="button">
          <svg class="ehsq-toolbar__tool-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true">
            <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
          </svg>
          <span class="ehsq-toolbar__tool-label">Save</span>
        </button>
        <button class="ehsq-toolbar__tool" type="button">
          <svg class="ehsq-toolbar__tool-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true">
            <path d="M16 5l-1.42 1.42-1.59-1.59V16h-1.98V4.83L9.42 6.42 8 5l4-4 4 4zm4 5v11c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V10c0-1.11.9-2 2-2h3v2H6v11h12V10h-3V8h3c1.1 0 2 .89 2 2z"/>
          </svg>
          <span class="ehsq-toolbar__tool-label">Export</span>
        </button>
        <button class="ehsq-toolbar__tool" type="button">
          <svg class="ehsq-toolbar__tool-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
          </svg>
          <span class="ehsq-toolbar__tool-label">Notifications</span>
        </button>
        <button class="ehsq-toolbar__action" type="button">
          <svg class="ehsq-toolbar__action-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" aria-hidden="true">
            <path d="M10 16.5l6-4.5-6-4.5v9zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
          </svg>
          <span class="ehsq-toolbar__action-label">Run</span>
        </button>
      </div>
      <div class="ehsq-toolbar__secondary">
        <!-- Opens the Options panel (collapses Sort + Display modes on mobile) -->
        <button
          class="ehsq-toolbar__options-menu"
          type="button"
          data-action="open-options-panel"
          aria-haspopup="dialog"
          aria-expanded="false"
        >
          <span class="material-symbols-rounded" aria-hidden="true">tune</span>
          <span>Options</span>
        </button>

        <div class="ehsq-toolbar__sort">
          <span class="ehsq-toolbar__sort-label">Sort:</span>
          <button class="ehsq-toolbar__sort-dropdown" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span>Last Updated</span>
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
              <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
            </svg>
          </button>
        </div>
        <div class="ehsq-toolbar__modes" role="radiogroup" aria-label="Display mode">
          <button class="ehsq-toolbar__mode ehsq-toolbar__mode--active" type="button" role="radio" aria-checked="true" data-mode="list" aria-label="List view">
            <span class="material-symbols-rounded" aria-hidden="true">list</span>
          </button>
          <button class="ehsq-toolbar__mode" type="button" role="radio" aria-checked="false" data-mode="table" aria-label="Table view">
            <span class="material-symbols-rounded" aria-hidden="true">table</span>
          </button>
          <button class="ehsq-toolbar__mode" type="button" role="radio" aria-checked="false" data-mode="card" aria-label="Card view">
            <span class="material-symbols-rounded" aria-hidden="true">cards_stack</span>
          </button>
          <button class="ehsq-toolbar__mode" type="button" role="radio" aria-checked="false" data-mode="calendar" aria-label="Calendar view">
            <span class="material-symbols-rounded" aria-hidden="true">event</span>
          </button>
          <button class="ehsq-toolbar__mode" type="button" role="radio" aria-checked="false" data-mode="hierarchy" aria-label="Hierarchy view">
            <span class="material-symbols-rounded" aria-hidden="true">account_tree</span>
          </button>
          <button class="ehsq-toolbar__mode" type="button" role="radio" aria-checked="false" data-mode="chart" aria-label="Chart view">
            <span class="material-symbols-rounded" aria-hidden="true">insert_chart</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <p class="stage-caption"><strong>Search page toolbar</strong> — Responsive Search (before). Resize the window below 1200px to see the responsive collapse.</p>

  <!-- Mobile Tools dropdown menu -->
  <div class="overflow-menu overflow-menu--tools" data-tools-menu role="menu" hidden>
    <button class="overflow-menu__item" role="menuitem">
      <span class="material-symbols-rounded" aria-hidden="true">save</span>
      Save
    </button>
    <button class="overflow-menu__item" role="menuitem">
      <span class="material-symbols-rounded" aria-hidden="true">ios_share</span>
      Export
    </button>
    <button class="overflow-menu__item" role="menuitem">
      <span class="material-symbols-rounded" aria-hidden="true">notifications</span>
      Notifications
    </button>
    <button class="overflow-menu__item overflow-menu__item--primary" role="menuitem">
      <span class="material-symbols-rounded" aria-hidden="true">play_circle</span>
      Run
    </button>
  </div>

  <!-- Options panel — slides down from the toolbar, holds all display controls -->
  <div class="options-scrim" data-options-scrim hidden></div>
  <aside class="options-panel" data-options-panel hidden role="dialog" aria-modal="true" aria-label="Options">
    <div class="options-panel__tabs" role="tablist">
      <button class="options-tab is-active" type="button" role="tab" aria-selected="true" data-options-tab="display">Display</button>
      <button class="options-tab" type="button" role="tab" aria-selected="false" data-options-tab="fields">Fields</button>
      <button class="options-tab" type="button" role="tab" aria-selected="false" data-options-tab="groupings">Groupings</button>
      <button class="options-panel__close" type="button" aria-label="Close options" data-action="close-options-panel">
        <span class="material-symbols-rounded">close</span>
      </button>
    </div>
    <div class="options-panel__body" data-options-body><!-- rendered by app.js per tab + display mode --></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
