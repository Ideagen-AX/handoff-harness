<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Filter Drawer — Praxis (After)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0..1,0" rel="stylesheet" />
  <!-- CSS extracted verbatim from the Praxis search page so the drawer renders identically. -->
  <link rel="stylesheet" href="praxis-core.css" />
  <link rel="stylesheet" href="praxis-create-new.css" />
  <link rel="stylesheet" href="praxis-module-selector.css" />
  <link rel="stylesheet" href="inline.css" />
  <link rel="stylesheet" href="praxis-appbar.css" />
  <link rel="stylesheet" href="praxis-navrail.css" />
  <link rel="stylesheet" href="praxis-pageheader.css" />
  <style>
  /* Isolation frame only — a blank page holding the filter drawer + its trigger.
     Not part of the component. */
  html, body { height: 100%; margin: 0; }
  body {
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: var(--px-page, #f0f2f4);
    font-family: 'Gilroy', 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; }
</style>
</head>
<body data-variant="praxis" data-theme="light" data-page="search">

  <!-- icon sprite (only the filter glyph the trigger references) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs><symbol id="i-filter" viewBox="0 0 24 24"><path d="M10 18h4v-2h-4zM3 6v2h18V6zm3 7h12v-2H6z"/></symbol></defs></svg>

  <!-- Trigger (verbatim from source) -->
  <button class="pill-btn" id="openFilterDrawer" data-action="open-filter-drawer"><svg class="icon icon--18"><use href="#i-filter"></use></svg> Add Filters</button>

  <!-- Isolated component: filter drawer (rendered snapshot from Praxis) -->
  <div class="drawer-scrim" data-drawer-scrim="" hidden></div>
  <aside class="filter-drawer" data-filter-drawer="" aria-label="Filters" role="dialog" aria-modal="true" hidden>
  <header class="filter-drawer__head">
    <h2>Filter Results</h2>
    <button class="fdw-icon-btn filter-drawer__close" type="button" aria-label="Close filters" data-action="close-filter-drawer">
      <span class="material-symbols-rounded">close</span>
    </button>
  </header>

  <!-- Toolbar: search + type-filter row, then the Custom Filter toggle -->
  <div class="filter-drawer__toolbar">
    <div class="filter-toolbar-row">
      <div class="filter-search-input">
        <input type="search" placeholder="Search Filters" aria-label="Search filters">
        <span class="material-symbols-rounded" aria-hidden="true">search</span>
      </div>
      <button class="filter-select filter-type-select" type="button" data-action="open-type-menu" aria-haspopup="listbox" aria-label="Filter by category">
        <span data-type-label="">All types</span>
        <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
      </button>
    </div>
    <button class="custom-filter-btn" type="button" data-action="toggle-custom-builder">
      <span class="material-symbols-rounded custom-filter-btn__icon" aria-hidden="true">account_tree</span>
      <span class="custom-filter-btn__label">Custom Filter</span>
    </button>
  </div>

  <div class="filter-drawer__main">

      <div class="custom-summary" data-custom-summary="" hidden=""></div>
      <div data-filter-list="">

            <span class="filter-row__icon material-symbols-rounded" aria-hidden="true">list</span>
            <h3 class="filter-row__title">Current Assignee</h3>
          </button>
          <button class="filter-row__quick" type="button" data-action="toggle-quick" aria-pressed="false" title="Show as a quick filter">
            <span class="material-symbols-rounded" aria-hidden="true">bolt</span>
          </button>
          <button class="filter-row__fav is-on" type="button" data-action="toggle-fav" aria-pressed="true" title="Remove from favorites">
            <span class="material-symbols-rounded" aria-hidden="true">bookmark</span>
          </button>
        </header>
        <div class="filter-row__body">
          <div class="filter-row__controls"><button class="filter-select filter-op" type="button" data-role="op" aria-label="Current Assignee operator">
            <span>Is One Of</span>
            <span class="material-symbols-rounded" aria-hidden="true">expand_more</span>
          </button>
          <div class="filter-row__value" data-value-area=""><button class="filter-select" type="button"><span>Select Value(s)</span><span class="material-symbols-rounded" aria-hidden="true">expand_more</span></button></div></div>

    <!-- Custom filter expression builder — overlays the filter list -->
    <div class="custom-builder" data-custom-builder="" hidden="">
      <div class="custom-builder__head">
        <div>
          <h3>Custom Filter</h3>
          <p>Chain filters with AND / OR and group them with brackets. Groups read as parentheses in the expression below.</p>
        </div>
        <button class="cf-example-btn" type="button" data-action="cf-load-example">Load example</button>
      </div>
      <div class="custom-builder__tree" data-builder-root=""></div>
      <div class="custom-builder__preview">
        <span class="custom-builder__preview-label">Expression</span>
        <div class="custom-builder__preview-body" data-builder-preview="" aria-live="polite"></div>
      </div>
      <div class="custom-builder__actions">
        <button class="fdw-btn fdw-btn--clear" type="button" data-action="cf-clear">Clear</button>
        <button class="fdw-btn fdw-btn--primary" type="button" data-action="cf-apply">Apply Expression</button>
      </div>
    </div>
  </div>

  <footer class="filter-drawer__foot">
    <button class="fdw-btn fdw-btn--clear" type="button" data-action="clear-all" data-restore-defaults="" hidden="">Restore Defaults</button>
    <button class="fdw-btn fdw-btn--secondary" type="button" data-action="close-filter-drawer">Cancel</button>
    <button class="fdw-btn fdw-btn--primary" type="button" data-action="close-filter-drawer" data-apply-btn="" disabled="">Apply</button>
  </footer>
</aside>

  <script>
(function(){
  var drawer  = document.querySelector('[data-filter-drawer]');
  var scrim   = document.querySelector('[data-drawer-scrim]');
  var openBtn = document.querySelector('[data-action="open-filter-drawer"]');
  if(!drawer||!scrim) return;
  // force closed initial state
  drawer.hidden = true; drawer.removeAttribute('data-open');
  scrim.hidden = true;  scrim.removeAttribute('data-open');
  function open(){
    drawer.hidden=false; scrim.hidden=false;
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      drawer.setAttribute('data-open',''); scrim.setAttribute('data-open','');
    });});
    document.body.style.overflow='hidden';
  }
  function close(){
    drawer.removeAttribute('data-open'); scrim.removeAttribute('data-open');
    setTimeout(function(){ drawer.hidden=true; scrim.hidden=true; document.body.style.overflow=''; }, 380);
  }
  openBtn && openBtn.addEventListener('click', open);
  scrim.addEventListener('click', close);
  document.querySelectorAll('[data-action="close-filter-drawer"]').forEach(function(b){ b.addEventListener('click', close); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && !drawer.hidden) close(); });
})();
</script>
</body>
</html>
